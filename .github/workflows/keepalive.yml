name: Keep Alive Render

on:
  schedule:
    # Roda a cada 4 minutos para evitar que o Render adormeça
    - cron: '*/4 * * * *'
  # Permite rodar manualmente se necessário
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API
        run: |
          curl -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36" \
               https://acompanhamento-escalada.onrender.com/api/ping
